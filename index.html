<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>反手一个宠物</title>
  <style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#f1d67f;touch-action:none}
    canvas{display:block;width:100vw;height:100dvh}
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  "use strict";
  const c = document.getElementById("game");
  const g = c.getContext("2d", { alpha: false });
  const DPR = Math.max(1, Math.min(3, devicePixelRatio || 1));
  const W = 390, H = 844;
  const A = "assets/";
  const pets = [
    { id:"bossdog", name:"霸总狗", rarity:"传说", file:"bossdog.jpg", birth:"女人，你在玩火。……这蛋是我承包的，拍出来的宠物，只能是我。", lines:["别碰我的雪茄，这是身份的象征。你碰坏了，就得对我负责。","天凉了，该让隔壁老王家的猫破产了。"] },
    { id:"grasscat", name:"打工猫", rarity:"普通", file:"grasscat.jpg", birth:"早安，打工人。现在是凌晨三点，我刚刚下班。对了，你拍我出来有什么事？没事的话我先睡五分钟。", lines:["这杯咖啡是我的生命维持液，别碰。没它我活不过今天的第三场会议。","你知道凌晨四点的城市长什么样吗？我知道，我每天都看着它下班。"] },
    { id:"workdog", name:"修Bug狗", rarity:"梗王", file:"workdog.jpg", birth:"今晚不修 bug 了，修了也没用，上线还是会崩。不如我俩一起崩。", lines:["别摸我头，摸掉的每一根毛，都是我昨天熬夜掉的头发。我头发呢？！","今晚不修 bug 了，修了也没用，上线还是会崩。"] }
  ];
  const rarityColor = { "普通":"#4b9f5f", "稀有":"#3d8bff", "传说":"#d89522", "梗王":"#c43df0" };
  const img = {};
  const store = JSON.parse(localStorage.getItem("fanpet_3dmini") || "{}");
  const s = {
    view:"home", tickets:Number.isFinite(store.tickets)?store.tickets:1, max:8, last:store.last||Date.now(),
    bag:Array.isArray(store.bag)?store.bag:[], cur:null, selected:null, buttons:[],
    msg:"先点“开启体感”，允许权限后把手机翻到屏幕朝下。", hold:0, hatchAt:0,
    motion:"未开启", motionReady:false, faceUpSeen:false, faceDownSince:0, baseZ:null, lastFlip:0, cooling:0, subtitleUntil:0
  };

  function save(){ localStorage.setItem("fanpet_3dmini", JSON.stringify({ tickets:s.tickets, last:s.last, bag:s.bag, selected:s.selected })); }
  function resize(){ c.width = innerWidth * DPR; c.height = innerHeight * DPR; g.setTransform(DPR,0,0,DPR,0,0); }
  addEventListener("resize", resize); resize();
  function M(){ const sc = Math.min(innerWidth / W, innerHeight / H); return { sc, ox:(innerWidth-W*sc)/2, oy:(innerHeight-H*sc)/2 }; }
  function X(x){ const m=M(); return m.ox + x*m.sc; } function Y(y){ const m=M(); return m.oy + y*m.sc; } function S(v){ return v*M().sc; }
  function rr(x,y,w,h,r,fill,stroke="rgba(81,52,28,.35)"){ g.beginPath(); g.roundRect(X(x),Y(y),S(w),S(h),S(r)); g.fillStyle=fill; g.fill(); if(stroke){ g.strokeStyle=stroke; g.lineWidth=S(2); g.stroke(); } }
  function text(t,x,y,sz,col="#352115",align="center",weight=800){ g.font=`${weight} ${S(sz)}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`; g.fillStyle=col; g.textAlign=align; g.textBaseline="middle"; g.fillText(t,X(x),Y(y)); }
  function wrap(t,x,y,w,sz,col="#352115"){ g.font=`800 ${S(sz)}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`; g.fillStyle=col; g.textAlign="center"; g.textBaseline="top"; let line="", yy=y; for(const ch of [...t]){ const n=line+ch; if(g.measureText(n).width > S(w) && line){ g.fillText(line,X(x+w/2),Y(yy)); line=ch; yy+=sz*1.42; } else line=n; } if(line) g.fillText(line,X(x+w/2),Y(yy)); }
  function btn(x,y,w,h,label,fn,fill="#fff0b5"){ s.buttons.push({x,y,w,h,fn}); rr(x,y,w,h,18,fill); text(label,x+w/2,y+h/2,15); }
  function hit(px,py){ const m=M(); const x=(px-m.ox)/m.sc, y=(py-m.oy)/m.sc; for(let i=s.buttons.length-1;i>=0;i--){ const b=s.buttons[i]; if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h) return b; } return null; }
  function load(){ for(const p of pets){ const i=new Image(); i.src=A+"pets/"+p.file; img[p.id]=i; } const m=new Image(); m.src=A+"maininterface.jpg"; img.main=m; const d=new Image(); d.src=A+"dex.jpg"; img.dex=d; const sh=new Image(); sh.src=A+"sharingcard.jpg"; img.share=sh; for(const r of Object.keys(rarityColor)){ const ri=new Image(); ri.src=A+"rarity/"+r+".png"; img["rar:"+r]=ri; } }
  function drawContain(image,x,y,w,h){ if(!image||!image.complete) return; const ir=image.width/image.height, or=w/h; let sx=0, sy=0, sw=image.width, sh=image.height; if(ir>or){ sw=image.height*or; sx=(image.width-sw)/2; } else { sh=image.width/or; sy=(image.height-sh)/2; } g.drawImage(image,sx,sy,sw,sh,x,y,w,h); }
  function speak(t){ s.msg=t; s.subtitleUntil=performance.now()+5000; try { speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t.replace(/[“”]/g,"")); u.lang="zh-CN"; u.rate=1.03; u.pitch=1.05; speechSynthesis.speak(u); } catch(_) {} }
  function regen(){ const now=Date.now(), step=900000; if(s.tickets>=s.max){ s.last=now; return; } const n=Math.floor((now-s.last)/step); if(n>0){ s.tickets=Math.min(s.max, s.tickets+n); s.last += n*step; save(); } }
  function nextText(){ const left=Math.max(0,900000-(Date.now()-s.last)); return `${String(Math.floor(left/60000)).padStart(2,"0")}:${String(Math.floor(left%60000/1000)).padStart(2,"0")}`; }
  function addTicket(){ s.tickets=Math.min(s.max, s.tickets+1); s.last=Date.now(); speak("已补充一张蛋壳券。"); save(); }
  function hatch(){ if(performance.now() < s.cooling) return; if(s.tickets<=0){ speak("蛋壳券用完了，等恢复或点补一张。"); return; } s.cooling = performance.now()+1800; s.tickets--; s.cur = { ...pets[Math.floor(Math.random()*pets.length)], uid: Date.now()+"_"+Math.random().toString(16).slice(2), got: Date.now() }; s.hatchAt = performance.now(); s.view = "hatch"; if(navigator.vibrate) navigator.vibrate([35,35,80]); speak("啪！蛋壳裂开了。"); setTimeout(() => speak(s.cur.birth), 650); save(); }
  function top(){ rr(16,18,112,36,18,"rgba(255,243,200,.86)"); text(`券 ${s.tickets}/${s.max}`,72,36,14); rr(266,18,108,36,18,"rgba(255,243,200,.86)"); text(s.motion,320,36,13); }
  function bg(){ g.fillStyle="#f1d67f"; g.fillRect(0,0,innerWidth,innerHeight); if(img.main) drawContain(img.main,0,0,innerWidth,innerHeight); }
  function shell(x,y,open=0){ const t = performance.now()/260; if(img.main&&img.main.complete){ const wobble = Math.sin(t)*2.5; g.save(); g.translate(S(wobble),0); } g.strokeStyle="rgba(84,55,31,.75)"; g.lineWidth=S(4); g.fillStyle="rgba(255,248,225,.96)"; g.beginPath(); g.ellipse(X(x),Y(y),S(76),S(100),0,0,Math.PI*2); g.fill(); g.stroke(); g.fillStyle="rgba(255,227,146,.95)"; g.beginPath(); g.ellipse(X(x-18),Y(y-20),S(18),S(26),-0.35,0,Math.PI*2); g.fill(); if(open>0){ g.strokeStyle="#4d311b"; g.lineWidth=S(5); g.beginPath(); g.moveTo(X(x-61),Y(y-8)); g.lineTo(X(x-28),Y(y+7+open*20)); g.lineTo(X(x),Y(y-5)); g.lineTo(X(x+24),Y(y+12+open*20)); g.lineTo(X(x+61),Y(y-11)); g.stroke(); } if(img.main&&img.main.complete){ g.restore(); } }
  function drawPet(p,cx,cy,w,h){ drawContain(img[p.id],X(cx-w/2),Y(cy-h/2),S(w),S(h)); const r=img["rar:"+p.rarity]; if(r&&r.complete) drawContain(r,X(cx-58),Y(cy+h/2-40),S(116),S(46)); else { rr(cx-48,cy+h/2-34,96,30,15,"#fff3ca",rarityColor[p.rarity]); text(p.rarity,cx,cy+h/2-18,13,rarityColor[p.rarity]); } }
  function home(){ bg(); top(); rr(30,640,330,78,22,"rgba(255,248,220,.92)"); wrap(s.msg,54,658,282,14); btn(28,736,106,48,"开启体感",enableMotion,"#f3dfb1"); btn(142,736,106,48,s.tickets>0?"长按孵化":"补一张",()=>s.tickets>0?hatch():addTicket(),"#c98052"); btn(256,736,106,48,"图鉴",()=>s.view="dex","#f3dfb1"); if(s.hold){ const p=Math.min(1,(performance.now()-s.hold)/1000); g.strokeStyle="#c98052"; g.lineWidth=S(8); g.beginPath(); g.arc(X(195),Y(430),S(132),-Math.PI/2,-Math.PI/2+p*Math.PI*2); g.stroke(); if(p>=1){ s.hold=0; hatch(); } } shell(195,410,0); }
  function hatchView(){ bg(); top(); const t = Math.min(1,(performance.now()-s.hatchAt)/1250); shell(195,415,t); if(t>.38&&s.cur) drawPet(s.cur,195,374,260,462); if(t<1){ g.globalAlpha=t; rr(58,598,274,88,22,"rgba(255,248,220,.92)"); wrap(s.msg,82,618,226,14); g.globalAlpha=1; } else { rr(44,608,302,98,22,"rgba(255,248,220,.92)"); wrap(s.msg,68,628,270,14); btn(46,732,132,54,"收养",()=>{ s.bag.unshift(s.cur); s.selected=s.cur.uid; s.cur=null; s.hatchAt=0; s.view="detail"; save(); },"#c98052"); btn(210,732,132,54,"放生",()=>{ speak("别放生我，我会自己走丢的。"); s.cur=null; s.hatchAt=0; s.view="home"; },"#f3dfb1"); } }
  function dex(){ bg(); top(); if(img.dex) drawContain(img.dex,0,0,innerWidth,innerHeight); rr(18,78,354,632,28,"rgba(255,248,220,.86)","rgba(98,61,31,.25)"); text("宠物图鉴",195,112,24,"#3a2414","center",900); text(`已收集 ${s.bag.length}`,195,144,14); if(!s.bag.length) wrap("还没有宠物，回到领养台反手孵一只。",70,360,250,16); s.bag.slice(0,9).forEach((p,i)=>{ const x=42+i%3*104, y=178+Math.floor(i/3)*158; rr(x,y,86,138,18,"rgba(255,244,202,.9)","rgba(98,61,31,.28)"); drawPet(p,x+43,y+58,76,135); text(p.name,x+43,y+124,11); s.buttons.push({x,y,w:86,h:138,fn:()=>{ s.selected=p.uid; s.view="detail"; speak(p.lines[0]||p.birth); }}); }); btn(44,744,120,48,"返回",()=>s.view="home"); btn(226,744,120,48,"清空",()=>{ s.bag=[]; save(); },"#f3dfb1"); }
  function detail(){ const p=s.bag.find(v=>v.uid===s.selected)||s.bag[0]; if(!p){ s.view="dex"; return; } bg(); top(); drawPet(p,195,382,260,462); rr(34,618,322,94,22,"rgba(255,248,220,.92)","rgba(98,61,31,.25)"); text(p.name,195,640,22,"#3a2414","center",900); wrap(s.msg,56,664,278,13); btn(42,746,92,48,"说话",()=>speak(p.lines[Math.floor(Math.random()*p.lines.length)]||p.birth),"#c98052"); btn(149,746,92,48,"分享卡",()=>s.view="share"); btn(256,746,92,48,"图鉴",()=>s.view="dex"); }
  function share(){ const p=s.bag.find(v=>v.uid===s.selected)||s.bag[0]; bg(); if(img.share) drawContain(img.share,0,0,innerWidth,innerHeight); if(p){ drawPet(p,195,392,260,462); rr(40,622,310,104,24,"rgba(255,248,220,.92)","rgba(98,61,31,.25)"); text("我反手拍出了 "+p.name,195,646,18,"#3a2414","center",900); wrap(p.birth,62,674,266,13); } btn(130,766,130,46,"返回详情",()=>s.view="detail"); }
  async function enableMotion(){
    try{
      let granted = true;
      if(window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === "function"){
        granted = await DeviceOrientationEvent.requestPermission() === "granted";
      }
      if(window.DeviceMotionEvent && typeof DeviceMotionEvent.requestPermission === "function"){
        granted = (await DeviceMotionEvent.requestPermission() === "granted") && granted;
      }
      if(!granted) throw new Error("permission denied");
      s.motion = "体感已开";
      s.motionReady = true;
      s.faceUpSeen = false;
      s.faceDownSince = 0;
      s.baseZ = null;
      s.lastFlip = 0;
      speak("体感已开启。把手机屏幕朝上停一下，再反手翻到屏幕朝下。");
    } catch(e){
      s.motion = "长按兜底";
      s.motionReady = false;
      speak("体感权限没有打开。现场也可以长按中间的蛋孵化。");
    }
  }
  function detectFlip(faceUp, faceDown){
    if(!s.motionReady || s.view !== "home" || s.tickets<=0 || performance.now()<s.cooling) return;
    const now = performance.now();
    if(faceUp){
      s.faceUpSeen = true;
      s.faceDownSince = 0;
      return;
    }
    if(!faceDown) {
      s.faceDownSince = 0;
      return;
    }
    if(!s.faceUpSeen) s.faceUpSeen = true;
    if(!s.faceDownSince) s.faceDownSince = now;
    if(now - s.faceDownSince > 180) hatch();
  }
  addEventListener("devicemotion", e => {
    const a = e.accelerationIncludingGravity;
    if(!a) return;
    const z = a.z || 0;
    detectFlip(z > 6.2, z < -6.2);
  });
  addEventListener("deviceorientation", e => {
    const beta = e.beta, gamma = e.gamma;
    if(beta == null || gamma == null) return;
    detectFlip(Math.abs(beta) < 35 && Math.abs(gamma) < 55, Math.abs(beta) > 145 || Math.abs(gamma) > 145);
  });
  c.addEventListener("pointerdown", e => { const b = hit(e.clientX,e.clientY); if(b){ b.fn(); return; } const m=M(), x=(e.clientX-m.ox)/m.sc, y=(e.clientY-m.oy)/m.sc; if(s.view === "home" && x>85 && x<305 && y>330 && y<650) s.hold = performance.now(); });
  c.addEventListener("pointerup", ()=>s.hold=0); c.addEventListener("pointercancel", ()=>s.hold=0);
  function loop(){ regen(); s.buttons=[]; if(s.subtitleUntil < performance.now() && s.view === "home") s.msg = s.tickets>0 ? "先点“开启体感”，允许权限后把手机翻到屏幕朝下。" : "蛋壳券恢复中，等一会儿再来。"; if(s.view==="home") home(); else if(s.view==="hatch") hatchView(); else if(s.view==="dex") dex(); else if(s.view==="detail") detail(); else share(); requestAnimationFrame(loop); }
  load(); loop();
})();
</script>
</body>
</html>
